<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>NebulaTalk - 새 캐릭터 만들기</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        background: #eef2f7;
        color: #0f172a;
      }

      .wrap {
        width: min(560px, 100vw);
        min-height: 100vh;
        margin: 0 auto;
        padding: calc(12px + env(safe-area-inset-top)) 12px calc(94px + env(safe-area-inset-bottom));
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      .back {
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 10px;
        padding: 8px 10px;
        background: #ffffff;
        color: #0f172a;
        text-decoration: none;
        font-weight: 800;
      }

      .title {
        margin: 0;
        font-size: 22px;
        font-weight: 900;
      }

      .panel {
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 16px;
        background: #ffffff;
        padding: 12px;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }

      .label {
        font-size: 13px;
        font-weight: 700;
        color: #334155;
      }

      .input,
      .textarea,
      .select {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.34);
        background: #f8fafc;
        color: #0f172a;
        padding: 11px 12px;
        font-size: 14px;
      }

      .textarea {
        min-height: 90px;
        resize: vertical;
      }

      .preview {
        width: 96px;
        height: 96px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.34);
        overflow: hidden;
        display: none;
        background: #f1f5f9;
      }

      .preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .btn {
        border: 1px solid rgba(148, 163, 184, 0.34);
        border-radius: 12px;
        padding: 11px;
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
      }

      .btn.primary {
        border-color: rgba(37, 99, 235, 0.6);
        color: #ffffff;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
      }

      .btn.secondary {
        background: #f8fafc;
        color: #334155;
      }

      .bottom-nav {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: calc(10px + env(safe-area-inset-bottom));
        width: min(560px, calc(100vw - 16px));
        height: 66px;
        border: 1px solid rgba(148, 163, 184, 0.32);
        border-radius: 16px;
        background: rgba(248, 250, 252, 0.96);
        backdrop-filter: blur(12px);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        align-items: center;
        z-index: 90;
      }

      .bottom-nav a {
        text-decoration: none;
        color: #64748b;
        display: grid;
        justify-items: center;
        gap: 2px;
        font-size: 11px;
        font-weight: 700;
      }

      .bottom-nav .icon {
        font-size: 16px;
      }

      .bottom-nav a.active {
        color: #0f172a;
      }
    </style>
  </head>
  <body data-page="create-form">
    <main class="wrap">
      <header class="header">
        <a class="back" href="create.html">← 목록</a>
        <h1 class="title" id="createFormTitle">새 캐릭터 만들기</h1>
      </header>

      <section class="panel">
        <form id="characterCreateForm">
          <div class="field">
            <label class="label" for="characterName">캐릭터 이름 *</label>
            <input id="characterName" class="input" required maxlength="40" />
          </div>

          <div class="field">
            <label class="label" for="characterDescription">소개</label>
            <textarea id="characterDescription" class="textarea"></textarea>
          </div>

          <div class="field">
            <label class="label" for="characterPersona">성격/설정</label>
            <textarea id="characterPersona" class="textarea"></textarea>
          </div>

          <div class="field">
            <label class="label" for="characterGreeting">첫 인사</label>
            <textarea id="characterGreeting" class="textarea"></textarea>
          </div>

          <div class="field">
            <label class="label" for="characterTags">태그</label>
            <input id="characterTags" class="input" placeholder="로맨스, 일상, 판타지" />
          </div>

          <div class="field">
            <label class="label" for="thumbnailUrl">썸네일 URL</label>
            <input id="thumbnailUrl" class="input" placeholder="https://..." />
          </div>

          <div class="field">
            <label class="label" for="thumbnailFile">썸네일 업로드</label>
            <input id="thumbnailFile" class="input" type="file" accept="image/*" />
            <div class="preview" id="thumbnailPreviewWrap">
              <img id="thumbnailPreview" alt="썸네일 미리보기" />
            </div>
          </div>

          <div class="field">
            <label class="label" for="characterVisibility">공개 설정</label>
            <select id="characterVisibility" class="select">
              <option value="public">공개</option>
              <option value="private">비공개</option>
            </select>
          </div>

          <div class="actions">
            <button type="button" class="btn secondary" data-action="cancel-create">취소</button>
            <button id="createSubmitButton" type="submit" class="btn primary">생성</button>
          </div>
        </form>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="하단 메뉴">
      <a href="index.html">
        <span class="icon">⌂</span>
        <span>홈</span>
      </a>
      <a href="chat.html">
        <span class="icon">◉</span>
        <span>대화</span>
      </a>
      <a href="create.html" class="active" aria-current="page">
        <span class="icon">＋</span>
        <span>제작</span>
      </a>
      <a href="mypage.html">
        <span class="icon">◔</span>
        <span>마이페이지</span>
      </a>
    </nav>

    <script src="create-form.js" defer></script>
  </body>
</html>
