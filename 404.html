<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>페이지를 찾을 수 없습니다</title>
    <style media="screen">
      body { background: #0f1117; color: #e8ecf4; font-family: 'Pretendard Variable', 'SUIT Variable', 'Noto Sans KR', sans-serif; margin: 0; padding: 0; }
      #message { background: #191e2a; max-width: 400px; margin: 100px auto 16px; padding: 32px 24px; border-radius: 18px; border: 1px solid #2a3142; box-shadow: 0 8px 32px rgba(0,0,0,0.35); }
      #message h2 { color: #8b5cf6; font-weight: bold; font-size: 3rem; margin: 0 0 8px; }
      #message h1 { font-size: 1.4rem; font-weight: 700; color: #e8ecf4; margin: 0 0 16px; }
      #message p { line-height: 1.6; margin: 16px 0 24px; font-size: 0.92rem; color: #7a869e; }
      #message a { display: block; text-align: center; background: linear-gradient(135deg, #6366f1, #8b5cf6); text-decoration: none; color: white; padding: 14px; border-radius: 12px; font-weight: 700; }
      #message a:hover { box-shadow: 0 0 20px rgba(99,102,241,0.3); }
    </style>
  </head>
  <body>
    <div id="message">
      <h2>404</h2>
      <h1>페이지를 찾을 수 없습니다</h1>
      <p>요청하신 페이지가 존재하지 않습니다. URL을 확인하고 다시 시도해주세요.</p>
      <a href="index.html">홈으로 돌아가기</a>
    </div>
  </body>
</html>
