<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DokiSekai - 마이페이지</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="mypage">
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-tabs">
        <span style="font-weight:800;font-size:1.1rem;color:var(--text);">마이페이지</span>
      </div>
      <div class="topbar-icons">
        <a class="topbar-icon-btn" href="create.html" aria-label="새 캐릭터">
          <svg viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
        </a>
      </div>
    </header>

    <main class="page mypage-page">
      <section class="card mypage-header" id="mypageProfileSection">
        <!-- 로그인 전 -->
        <div id="mypageGuest" class="mypage-guest">
          <div class="mypage-avatar"><span>🌟</span></div>
          <div class="mypage-info">
            <h1>내 스토리</h1>
            <p class="small-muted">로그인하고 나만의 이야기를 저장하세요</p>
          </div>
          <div id="googleLoginBtn" class="google-login-wrap"></div>
        </div>
        <!-- 로그인 후 -->
        <div id="mypageUser" class="mypage-user" hidden>
          <img id="mypageUserAvatar" class="mypage-user-avatar" alt="" />
          <div class="mypage-info">
            <h1 id="mypageUserName"></h1>
            <p class="small-muted" id="mypageUserEmail"></p>
          </div>
          <button id="logoutBtn" class="button ghost small" type="button">로그아웃</button>
        </div>
      </section>

      <section class="summary-strip">
        <div class="mini-stat">
          <span>즐겨찾기</span>
          <strong id="mypageFavoriteCount">0</strong>
        </div>
        <div class="mini-stat">
          <span>내 캐릭터</span>
          <strong id="mypageCreatedCount">0</strong>
        </div>
        <div class="mini-stat">
          <span>대화</span>
          <strong id="mypageConversationCount">0</strong>
        </div>
      </section>

      <div class="mypage-actions-row">
        <button id="importDataBtn" class="button ghost small" type="button">가져오기</button>
        <button id="exportDataBtn" class="button ghost small" type="button">내보내기</button>
      </div>

      <section class="section-block">
        <div class="section-head">
          <div>
            <span class="section-kicker">즐겨찾기</span>
            <h2>즐겨찾기한 캐릭터</h2>
          </div>
        </div>
        <div id="favoriteGrid" class="character-grid"></div>
      </section>

      <section class="section-block">
        <div class="section-head">
          <div>
            <span class="section-kicker">내 캐릭터</span>
            <h2>내가 만든 캐릭터</h2>
          </div>
        </div>
        <div id="createdGrid" class="character-grid"></div>
      </section>

      <section class="section-block">
        <div class="section-head">
          <div>
            <span class="section-kicker">최근 대화</span>
            <h2>최근 대화</h2>
          </div>
        </div>
        <div id="mypageRecentChats" class="list-stack"></div>
      </section>
    </main>

    <nav class="mobile-nav" aria-label="모바일 메뉴">
      <a href="index.html">
        <span class="mobile-nav-icon">⌂</span>
        <span class="mobile-nav-label">홈</span>
      </a>
      <a href="chat.html">
        <span class="mobile-nav-icon">◉</span>
        <span class="mobile-nav-label">대화</span>
      </a>
      <a href="create.html">
        <span class="mobile-nav-icon">＋</span>
        <span class="mobile-nav-label">제작</span>
      </a>
      <a class="is-active" href="mypage.html">
        <span class="mobile-nav-icon">◔</span>
        <span class="mobile-nav-label">마이페이지</span>
      </a>
    </nav>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
