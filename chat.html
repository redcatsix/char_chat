<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NebulaTalk - 대화</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="chat">
  <div class="app-shell">
    <header class="topbar chat-topbar">
      <a class="chat-back-btn" href="index.html" aria-label="뒤로가기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </a>
      <div id="chatTopbarInfo" class="chat-topbar-info">
        <strong>대화를 선택하세요</strong>
      </div>
      <div class="chat-topbar-actions">
        <button id="chatSidebarToggle" class="topbar-icon-btn" type="button" aria-label="캐릭터 목록">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </button>
        <button id="chatSettingsToggle" class="topbar-icon-btn" type="button" aria-label="설정">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <main class="page chat-page">
      <div class="chat-layout">
        <aside class="card chat-sidebar" id="chatSidebar">
          <div class="sidebar-head">
            <div>
              <span class="section-kicker">CHARACTERS</span>
              <h2>대화 목록</h2>
            </div>
            <a class="button ghost small" href="explore.html">탐색</a>
          </div>

          <label class="search-inline">
            <span class="sr-only">캐릭터 목록 검색</span>
            <input id="chatCharacterSearch" type="search" placeholder="캐릭터 검색" />
          </label>

          <div id="chatCharacterList" class="chat-character-list"></div>
        </aside>

        <section class="card chat-main" style="border:none;border-radius:0;background:transparent;box-shadow:none;">
          <header id="chatHeader" class="chat-header" style="display:none;"></header>

          <div class="chat-notice">
            <div class="chat-notice-head">
              <strong>DeepInfra <code>DeepSeek-V3.2</code></strong>
              <div class="chat-notice-right">
                <span id="aiStatusBadge" class="ai-status waiting">연결 대기</span>
                <div class="chat-menu-wrap">
                  <button id="chatMenuToggle" class="chat-menu-btn" type="button" aria-label="대화 설정">
                    <span></span><span></span><span></span>
                  </button>
                  <div id="chatMenuDropdown" class="chat-menu-dropdown" hidden>
                    <button class="chat-menu-item" data-action="restart" type="button">
                      <strong>새로하기</strong>
                      <small>현재 내용은 자동 저장 중이에요</small>
                    </button>
                    <button class="chat-menu-item" data-action="delete-range" type="button">
                      <strong>대화 삭제</strong>
                      <small>범위를 선택해 삭제할 수 있어요</small>
                    </button>
                    <hr class="chat-menu-divider" />
                    <button class="chat-menu-item" data-action="profile" type="button">
                      <strong>대화 프로필</strong>
                      <small>대화할 프로필을 선택해요</small>
                    </button>
                  </div>
                </div>
              </div>
            </div>
            <p class="chat-notice-copy">서버 템플릿 기반으로 응답하며, 연결 실패 시에는 자동으로 목업 응답으로 전환됩니다.</p>
          </div>

          <div id="chatMessages" class="chat-messages"></div>

          <form id="chatComposer" class="chat-composer">
            <textarea
              id="chatInput"
              rows="1"
              placeholder="메시지를 입력하세요..."
            ></textarea>
            <div class="composer-actions">
              <button class="composer-send-btn" type="submit" aria-label="전송">
                <svg viewBox="0 0 24 24"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4z"/></svg>
              </button>
            </div>
          </form>
        </section>

        <aside class="card chat-sidepanel" id="chatSidepanel">
          <div class="sidebar-head">
            <div>
              <span class="section-kicker">STORY STYLE</span>
              <h2>응답 스타일</h2>
            </div>
          </div>

          <form id="styleForm" class="style-form">
            <label>
              <span>시점</span>
              <select name="pov">
                <option value="first">1인칭</option>
                <option value="second">2인칭</option>
                <option value="third" selected>3인칭</option>
              </select>
            </label>
            <label>
              <span>응답 길이</span>
              <select name="length">
                <option value="short">짧게</option>
                <option value="medium" selected>보통</option>
                <option value="long">길게</option>
              </select>
            </label>
            <label>
              <span>전개 속도</span>
              <select name="pacing">
                <option value="fast">빠르게</option>
                <option value="natural" selected>자연스럽게</option>
                <option value="slow">천천히</option>
              </select>
            </label>
            <label>
              <span>톤</span>
              <select name="tone">
                <option value="romance">로맨틱</option>
                <option value="slice">일상형</option>
                <option value="mystery">미스터리</option>
                <option value="fantasy">판타지</option>
                <option value="soft">다정한 위로</option>
              </select>
            </label>
          </form>

          <div id="characterProfileCard" class="profile-card"></div>
        </aside>
      </div>
    </main>

    <div class="chat-overlay" id="chatOverlay"></div>

    <nav class="mobile-nav" aria-label="모바일 메뉴">
      <a href="index.html">
        <span class="mobile-nav-icon">⌂</span>
        <span class="mobile-nav-label">홈</span>
      </a>
      <a class="is-active" href="chat.html">
        <span class="mobile-nav-icon">◉</span>
        <span class="mobile-nav-label">대화</span>
      </a>
      <a href="create.html">
        <span class="mobile-nav-icon">＋</span>
        <span class="mobile-nav-label">제작</span>
      </a>
      <a href="mypage.html">
        <span class="mobile-nav-icon">◔</span>
        <span class="mobile-nav-label">마이페이지</span>
      </a>
    </nav>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
